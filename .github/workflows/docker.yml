# Build osemgrep via docker.
# See also Dockerfile at the root of the project.

name: docker

on:
  pull_request_target: {}
  workflow_dispatch: null
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Used to be 'true' but we need 'recursive' now that we have
          # submodules inside submodules (e.g., ocaml-tree-sitter-core
          # inside semgrep-pfff-langs).
          submodules: recursive
      # optional if don't need multi-arch build
      - uses: docker/setup-buildx-action@v3
      - run: make build-docker

  build-ocaml5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Used to be 'true' but we need 'recursive' now that we have
          # submodules inside submodules (e.g., ocaml-tree-sitter-core
          # inside semgrep-pfff-langs).
          submodules: recursive
      - run: make build-docker-ocaml5
